name: Auto Update M3U Jadwal Olahraga

on:
  schedule:
    # Berjalan otomatis setiap 3 jam pada menit ke-0
    - cron: '0 */3 * * *'
  push:
    # Berjalan otomatis setiap ada perubahan file di branch main atau master
    branches:
      - main
      - master
    paths-ignore:
      # Jangan jalankan jika yang berubah hanya file M3U hasil (menghindari loop tak terbatas)
      - '*.m3u'
      - '*.m3u8'
  workflow_dispatch:
    # Memunculkan tombol "Run workflow" di tab Actions agar bisa dijalankan manual kapan saja

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          # Memastikan token Github Actions memiliki akses untuk push kembali
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install library requests. (xml.etree, re, datetime bawaan Python jadi tidak perlu di-install)
          pip install requests

      - name: 4. Jalankan Script Pencocokan EPG
        run: |
          python epgtom3u.py

      - name: 5. Simpan (Commit & Push) Hasil M3U ke Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          # Cek apakah ada perubahan pada file. Jika ada, lakukan commit dan push. Jika sama persis, abaikan.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update jadwal M3U: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
