name: Auto Update M3U Jadwal Olahraga

on:
    schedule:
    # Berjalan otomatis setiap 30 menit
    - cron: '*/30 * * * *'
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '*.m3u'
      - '*.m3u8'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 4. Jalankan Script Pencocokan EPG
        run: |
          python epgtom3u.py

      - name: 5. Simpan Hasil M3U ke Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update jadwal M3U: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
