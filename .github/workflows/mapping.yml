name: Generate EPG Mapping

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mengambil seluruh histori agar rebase lancar

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Jalankan Skrip Mapper
        run: python mapper.py

      - name: Commit dan Push Hasil Mapping
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist_termapping.m3u
          # Ambil perubahan terbaru dari server dulu agar tidak bentrok
          git pull origin main --rebase 
          git commit -m "Auto-update: M3U Bakul Wifi Sports Terbaru" || echo "Tidak ada perubahan data"
          git push origin main
