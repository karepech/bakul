name: Generate EPG Mapping

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan skrip ini secara manual lewat tombol di GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Jalankan Skrip Mapper
        run: python mapper.py

      - name: Commit dan Push Hasil Mapping
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add hasil_mapping.txt
          git commit -m "Update hasil mapping EPG otomatis" || echo "Tidak ada perubahan mapping"
          git push
