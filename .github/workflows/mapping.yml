name: Generate EPG Mapping

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Jalankan Skrip Mapper
        run: python mapper.py

      - name: Commit dan Push Hasil Mapping
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Tandai file yang berubah
          git add playlist_termapping.m3u
          
          # Simpan perubahan (Commit)
          git commit -m "Auto-update: M3U Bakul Wifi Sports Terbaru" || exit 0
          
          # Tarik update terbaru & gabungkan (Rebase)
          git pull origin main --rebase
          
          # Kirim ke server GitHub (Push)
          git push origin main
