name: Generate EPG Mapping

on:
  workflow_dispatch: # FITUR MANUAL: Berjalan saat kamu menekan tombol "Run workflow" di GitHub
  push:
    branches:
      - main # FITUR UPDATE REPO: Berjalan otomatis setiap kali kamu mengedit file (misal: kamus_mapping.txt) di branch main
  schedule:
    - cron: '0 * * * *' # FITUR OTOMATIS: Tetap berjalan setiap 1 jam untuk update jadwal EPG

# PENTING: Izin agar bot GitHub Action diperbolehkan melakukan "git push" kembali ke repo
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Jalankan Skrip Mapper
        run: python mapper.py

      - name: Commit dan Push Hasil Mapping
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist_termapping.m3u laporan_rumus.txt laporan_channel_m3u.txt
          git commit -m "Auto-update: M3U & Laporan EPG Terbaru" || echo "Tidak ada perubahan data"
          git push
